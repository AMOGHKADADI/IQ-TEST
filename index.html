
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SACA | Institutional Cognitive Protocol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --slate-950: #0a0f1e;
            --blue-600: #2563eb;
            --gold-primary: #c5a059;
            --bg-neutral: #fcfcfc;
            --inst-transition: cubic-bezier(0.2, 0, 0, 1);
        }
        
        * {
          -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-neutral);
            color: #1e293b;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            background-image: 
                radial-gradient(at 0% 0%, hsla(210,100%,99%,1) 0, transparent 50%), 
                radial-gradient(at 100% 100%, hsla(220,50%,98%,1) 0, transparent 50%);
            min-height: 100vh;
        }

        .font-serif { font-family: 'Playfair Display', serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        /* Institutional Reveal Animation */
        .animate-institutional {
            animation: instReveal 1s var(--inst-transition) forwards;
        }
        @keyframes instReveal {
            from { opacity: 0; transform: translateY(15px) scale(0.995); filter: blur(4px); }
            to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }

        /* Certificate Styling */
        .paper-canvas {
            background-color: #fffdfc;
            background-image: url("https://www.transparenttextures.com/patterns/p6.png");
            box-shadow: 0 40px 100px -20px rgba(10,15,30,0.12);
        }
        
        .security-guilloche {
            background-image: url("data:image/svg+xml,%3Csvg width='120' height='120' viewBox='0 0 120 120' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0c15 15 30 0 45 15s30 0 45 15 30 0 45 15 30 0 45 15' stroke='%23e2e8f0' fill='none' stroke-width='0.4'/%3E%3Cpath d='M120 0c-15 15-30 0-45 15s-30 0-45 15-30 0-45 15-30 0-45 15' stroke='%23e2e8f0' fill='none' stroke-width='0.4'/%3E%3C/svg%3E");
            opacity: 0.3;
        }

        .holographic-seal {
            background: linear-gradient(135deg, #0a0f1e 0%, #1e293b 50%, #0a0f1e 100%);
            background-size: 200% 200%;
            position: relative;
        }

        .micro-print {
            font-size: 7px;
            letter-spacing: 0.25em;
            color: #94a3b8;
            user-select: none;
            text-transform: uppercase;
            font-weight: 900;
        }

        /* Custom Scrollbar for Institutional Feel */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }

        /* Smooth Interactive Scaling */
        .hover-scale { transition: transform 0.4s var(--inst-transition); }
        .hover-scale:hover { transform: scale(1.02); }
        .active-scale:active { transform: scale(0.97); }
    </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0"
  }
}
</script>
</head>
<body>
    <div id="root"></div>
</body>
</html>
