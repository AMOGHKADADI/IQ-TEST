
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SACA | Institutional Cognitive Protocol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --slate-950: #0f172a;
            --blue-600: #2563eb;
            --gold-primary: #c5a059;
            --gold-secondary: #e6be8a;
            --bg-neutral: #fcfcfc;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-neutral);
            color: #1e293b;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            background-image: 
                radial-gradient(at 0% 0%, hsla(210,100%,99%,1) 0, transparent 50%), 
                radial-gradient(at 100% 100%, hsla(220,50%,98%,1) 0, transparent 50%);
        }
        .font-serif { font-family: 'Playfair Display', serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        /* Institutional Transitions */
        .animate-institutional {
            animation: institutionalReveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes institutionalReveal {
            from { opacity: 0; transform: translateY(20px) scale(0.99); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Certificate Aesthetics - Professional Overhaul */
        .paper-canvas {
            background-color: #fffdfa;
            background-image: url("https://www.transparenttextures.com/patterns/p6.png"); /* Subtle fiber texture */
            box-shadow: 0 40px 100px -20px rgba(0,0,0,0.15);
        }
        
        .security-guilloche {
            background-image: url("data:image/svg+xml,%3Csvg width='120' height='120' viewBox='0 0 120 120' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0c15 15 30 0 45 15s30 0 45 15 30 0 45 15' stroke='%23e2e8f0' fill='none' stroke-width='0.4'/%3E%3Cpath d='M120 0c-15 15-30 0-45 15s-30 0-45 15-30 0-45 15' stroke='%23e2e8f0' fill='none' stroke-width='0.4'/%3E%3C/svg%3E");
            opacity: 0.5;
        }

        .holographic-seal {
            background: linear-gradient(135deg, #c5a059 0%, #f9f295 20%, #e6be8a 40%, #c5a059 60%, #b29433 80%, #f9f295 100%);
            background-size: 200% 200%;
            box-shadow: 0 10px 30px rgba(197, 160, 89, 0.4);
            position: relative;
        }

        .holographic-seal::after {
            content: '';
            position: absolute;
            inset: 4px;
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: inherit;
        }

        .cert-border-complex {
            border: 4px double var(--slate-950);
            padding: 8px;
            position: relative;
        }

        .cert-border-complex::before {
            content: '';
            position: absolute;
            inset: -12px;
            border: 1px solid rgba(15, 23, 42, 0.1);
        }

        .micro-print {
            font-size: 6px;
            letter-spacing: 0.15em;
            color: #cbd5e1;
            user-select: none;
            text-transform: uppercase;
            font-weight: 800;
        }

        .gold-leaf-text {
            background: linear-gradient(to bottom, #1e293b 0%, #0f172a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
<script type="importmap">

</script>
</head>
<body>
    <div id="root"></div>
</body>
</html>
